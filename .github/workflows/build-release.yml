name: Build and Release
on:
  repository_dispatch:
    types: [build_release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Bump versions in private repo config files ─────────────────────
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.extract.outputs.version }}
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Extract version from tag
        id: extract
        run: |
          TAG=${{ github.event.client_payload.tag }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.extract.outputs.version }}\"/" desktop/src-tauri/Cargo.toml

      - name: Bump tauri.conf.json
        run: |
          jq --arg v "${{ steps.extract.outputs.version }}" '.version = $v' desktop/src-tauri/tauri.conf.json > tmp.json && mv tmp.json desktop/src-tauri/tauri.conf.json

      - name: Bump package.json
        run: |
          jq --arg v "${{ steps.extract.outputs.version }}" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Bump src/config.ts download URLs
        run: |
          V=${{ steps.extract.outputs.version }}
          sed -i "s/VERSION: '[^']*'/VERSION: '$V'/" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_aarch64\.dmg|releases/download/v$V/PromptPilot_${V}_aarch64.dmg|g" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_x64\.dmg|releases/download/v$V/PromptPilot_${V}_x64.dmg|g" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_x64-setup\.exe|releases/download/v$V/PromptPilot_${V}_x64-setup.exe|g" src/config.ts

      - name: Commit version bumps back to private repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SOURCE_REPO_PAT }}@github.com/rrmassey/PromptPilot_v2.5.git
          git add desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json package.json src/config.ts
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.extract.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          set -e

          # Create release only if it doesn't already exist (idempotent for re-runs)
          if ! gh release view "$TAG" --repo rrmassey/PromptPilot-releases >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo rrmassey/PromptPilot-releases \
              --title "PromptPilot $TAG" \
              --notes "See the assets to download this version and install."
          fi

          # Fetch numeric release ID via gh api (no --repo flag; path is fully qualified)
          RELEASE_ID=$(gh api /repos/rrmassey/PromptPilot-releases/releases/tags/"$TAG" --jq '.id')

          echo "Using release id: $RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  # ── Job 2: Build matrix across all platforms ─────────────────────────────
  release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private source (with bumped versions)
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      # Latest ggml-org/llama.cpp release: full Windows zips into cuda/vulkan/cpu (DLLs beside llama-server.exe)
      - name: Download llama-server bundles (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $api = "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $headers = @{
            Accept = "application/vnd.github+json"
            "User-Agent" = "PromptPilot-CI"
            Authorization = "Bearer $env:GITHUB_TOKEN"
          }
          $release = Invoke-RestMethod -Uri $api -Headers $headers
          function Expand-LlamaBundle {
            param(
              [Parameter(Mandatory)] [string]$LikePattern,
              [Parameter(Mandatory)] [string]$DestRel
            )
            $matches = $release.assets | Where-Object { $_.name -like $LikePattern }
            $asset = $matches | Select-Object -First 1
            if (-not $asset) {
              throw "No llama.cpp asset matching: $LikePattern"
            }
            if (($matches | Measure-Object).Count -gt 1) {
              Write-Host "Multiple assets matched '$LikePattern'; selecting first: $($asset.name)"
            } else {
              Write-Host "Selected asset: $($asset.name)"
            }
            $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath -Headers $headers
            $dest = Join-Path $PWD $DestRel
            New-Item -ItemType Directory -Path $dest -Force | Out-Null
            Expand-Archive -Path $zipPath -DestinationPath $dest -Force
            Remove-Item $zipPath -Force
          }
          $base = "desktop/src-tauri/resources/llama-server"
          Expand-LlamaBundle -LikePattern "llama-*-bin-win-cuda-*-x64.zip" -DestRel (Join-Path $base "cuda")
          Expand-LlamaBundle -LikePattern "llama-*-bin-win-vulkan-x64.zip" -DestRel (Join-Path $base "vulkan")
          Expand-LlamaBundle -LikePattern "llama-*-bin-win-cpu-x64.zip" -DestRel (Join-Path $base "cpu")

      # Latest ggml-org/llama.cpp release: macOS tarball (Metal) includes dylibs next to llama-server
      - name: Download llama-server bundle (macOS)
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          REL_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "User-Agent: PromptPilot-CI" \
            "$API_URL")
          case "${{ matrix.rust-target }}" in
            aarch64-apple-darwin)
              SUFFIX="bin-macos-arm64.tar.gz"
              ;;
            x86_64-apple-darwin)
              SUFFIX="bin-macos-x64.tar.gz"
              ;;
            *)
              echo "Unsupported macOS rust target: ${{ matrix.rust-target }}"
              exit 1
              ;;
          esac
          NAME=$(echo "$REL_JSON" | jq -r --arg sfx "$SUFFIX" '.assets[] | select(.name|endswith($sfx)) | .name' | head -1)
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            echo "No asset ending with ${SUFFIX} in latest llama.cpp release"
            exit 1
          fi
          URL=$(echo "$REL_JSON" | jq -r --arg n "$NAME" '.assets[] | select(.name==$n) | .browser_download_url')
          WORK=$(mktemp -d)
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "User-Agent: PromptPilot-CI" \
            -o "$WORK/$NAME" \
            "$URL"
          tar xzf "$WORK/$NAME" -C "$WORK"
          ROOT=$(find "$WORK" -mindepth 1 -maxdepth 1 -type d -name 'llama-*' | head -1)
          if [ -z "$ROOT" ]; then
            echo "Could not find llama-* root directory in archive"
            exit 1
          fi
          DEST="desktop/src-tauri/resources/llama-server"
          mkdir -p "$DEST"
          cp -R "$ROOT"/* "$DEST/"
          chmod +x "$DEST/llama-server"

      - name: Verify llama-server binaries exist (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path "desktop/src-tauri/resources/llama-server" -Recurse -Filter "llama-server.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bin) {
            throw "llama-server.exe not found in resources — aborting build"
          }
          Write-Host "Found bundled binary: $($bin.FullName)"

      - name: Verify llama-server binary exists (macOS)
        if: startsWith(matrix.platform, 'macos-')
        shell: bash
        run: |
          if [ ! -f "desktop/src-tauri/resources/llama-server/llama-server" ]; then
            echo "llama-server binary missing!"
            exit 1
          fi
          echo "Found bundled binary: desktop/src-tauri/resources/llama-server/llama-server"

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/src-tauri
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --target ${{ matrix.rust-target }}
          includeUpdaterJson: true

  # ── Job 3: Rename latest.json → update.json, fix URLs, commit to private repo ─
  fix-update-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          gh release download $TAG \
            --repo rrmassey/PromptPilot-releases \
            --pattern "latest.json" \
            --dir /tmp/release-assets

      - name: Fix URLs and rename to update.json
        run: |
          sed 's|rrmassey/PromptPilot_v2.5/releases/download|rrmassey/PromptPilot-releases/releases/download|g' \
            /tmp/release-assets/latest.json > /tmp/release-assets/update.json

      - name: Upload update.json and delete latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          gh release upload $TAG /tmp/release-assets/update.json \
            --repo rrmassey/PromptPilot-releases \
            --clobber
          gh release delete-asset $TAG latest.json \
            --repo rrmassey/PromptPilot-releases \
            --yes

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Copy update.json to private repo and commit
        run: |
          cp /tmp/release-assets/update.json public/update.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SOURCE_REPO_PAT }}@github.com/rrmassey/PromptPilot_v2.5.git
          git add public/update.json
          git diff --staged --quiet || git commit -m "chore: update update.json for ${{ github.event.client_payload.tag }} [skip ci]"
          git push origin HEAD:main
