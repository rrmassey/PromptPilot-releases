name: Build and Release
on:
  repository_dispatch:
    types: [build_release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Bump versions in private repo config files ─────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      release_id: ${{ steps.create_release.outputs.release_id }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Extract version from tag
        id: extract
        run: |
          TAG=${{ github.event.client_payload.tag }}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.extract.outputs.version }}\"/" desktop/src-tauri/Cargo.toml

      - name: Bump tauri.conf.json
        run: |
          jq --arg v "${{ steps.extract.outputs.version }}" '.version = $v' desktop/src-tauri/tauri.conf.json > tmp.json && mv tmp.json desktop/src-tauri/tauri.conf.json

      - name: Bump package.json
        run: |
          jq --arg v "${{ steps.extract.outputs.version }}" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Bump src/config.ts download URLs
        run: |
          V=${{ steps.extract.outputs.version }}
          sed -i "s/VERSION: '[^']*'/VERSION: '$V'/" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_aarch64\.dmg|releases/download/v$V/PromptPilot_${V}_aarch64.dmg|g" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_x64\.dmg|releases/download/v$V/PromptPilot_${V}_x64.dmg|g" src/config.ts
          sed -i "s|releases/download/v[^/]*/PromptPilot_[^']*_x64-setup\.exe|releases/download/v$V/PromptPilot_${V}_x64-setup.exe|g" src/config.ts

      - name: Commit version bumps back to private repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SOURCE_REPO_PAT }}@github.com/rrmassey/PromptPilot_v2.5.git
          git add desktop/src-tauri/Cargo.toml desktop/src-tauri/tauri.conf.json package.json src/config.ts
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.extract.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          gh release create "$TAG" \
            --repo rrmassey/PromptPilot-releases \
            --title "PromptPilot $TAG" \
            --notes "See the assets to download this version and install."

          RELEASE_ID=$(gh api \
            --repo rrmassey/PromptPilot-releases \
            /repos/rrmassey/PromptPilot-releases/releases/tags/"$TAG" \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

  # ── Job 2: Build matrix across all platforms ─────────────────────────────
  release:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
          - platform: macos-15-intel
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout private source (with bumped versions)
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/src-tauri
          releaseId: ${{ needs.prepare.outputs.release_id }}
          args: --target ${{ matrix.rust-target }}
          includeUpdaterJson: true

  # ── Job 3: Rename latest.json → update.json, fix URLs, commit to private repo ─
  fix-update-json:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          gh release download $TAG \
            --repo rrmassey/PromptPilot-releases \
            --pattern "latest.json" \
            --dir /tmp/release-assets

      - name: Fix URLs and rename to update.json
        run: |
          sed 's|rrmassey/PromptPilot_v2.5/releases/download|rrmassey/PromptPilot-releases/releases/download|g' \
            /tmp/release-assets/latest.json > /tmp/release-assets/update.json

      - name: Upload update.json and delete latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          gh release upload $TAG /tmp/release-assets/update.json \
            --repo rrmassey/PromptPilot-releases \
            --clobber
          gh release delete-asset $TAG latest.json \
            --repo rrmassey/PromptPilot-releases \
            --yes

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: rrmassey/PromptPilot_v2.5
          token: ${{ secrets.SOURCE_REPO_PAT }}
          ref: main

      - name: Copy update.json to private repo and commit
        run: |
          cp /tmp/release-assets/update.json public/update.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.SOURCE_REPO_PAT }}@github.com/rrmassey/PromptPilot_v2.5.git
          git add public/update.json
          git diff --staged --quiet || git commit -m "chore: update update.json for ${{ github.event.client_payload.tag }} [skip ci]"
          git push origin HEAD:main
